<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header class="cabecalho">
            <h3> cadastre seu veículo para vender mais rápido </h3>

        </header>
        <div class="form-container">
            <div class="form-header">
                <p>formulário</p>
            </div>
            <div class="form-body">
                <h1 class="form-titulo">Venda fácil seu carro!</h1>
                <p>descreva as características do carro e marque os opcionais que ele possui</p>
                <form>
                    <div class="caixainputs">
                        <label for="title">titúlo do anúncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title" class= "block" placeholder="digite um título"
                            minlength="1" maxlength="30" required>

                    </div>
                    <div class="caixainputs">
                        <label for="preco">preço <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco" class="block" placeholder="digite o preço"
                            required>
                    </div>

                    <div class="caixainputs">
                        <label for="descricao">descrição</label>
                        <textarea name="descricao" id="descricao" class="block"
                            placeholder="faça a descrição do seu veículo aqui"></textarea>
                    </div>
                    <div class="caixainputs">
                        <label for="marca">marca<span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder="digite a marca" required>
                    </div>
                    <div class="caixainputs">
                        <label for="modelo">modelo<span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder="digite o modelo" required>
                    </div>
                    <div class="caixainputs">
                        <label for="kilometragem">kilometragem<span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder="digite uma kilometragem" required>
                    </div>
                    <div class="caixainputs">
                        <label for="data-compra">data compra<span class="campo-obrigatorio">*</span></label>
                        <input type="date" name="data-compra" id="data-compra" class="block" required>
                    </div>
                    <div class="caixainputs">
                       <p>tipo de câmbio: <span class="campo-obrigatorio">*</span></p>
                       <input type="radio" name="marcha" id="manual">
                       <label for="manual">manual</label>
                         <input type="radio" name="marcha" id="auto">
                       <label for="automatico">automático</label>
                    
                    </div>
                    <div class="caixaopcional">
                        <p>opcionais</p>
                        <ul class="listaopcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="airbag" value="airbag" >
                                <label for="airbag">Airbag</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="alarme" value="alarme" >
                                <label for="alarme">alarme</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="arcondicionado" value="arcondicionado" >
                                <label for="arcondicionado">arcondicionado</label>
                            </li>
                            <li><input type="checkbox" name="opcional[]" id="cameradere" value="cameradere" >
                                <label for="cameradere">cameradere</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaopcionais">
                        <ul class="listaopicionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="assistente-pista" value= "assistente-pista" >
                                    <label for="assistente-pista">assistente-pista</label>
                            </li>
                            <li><input type="checkbox" name="opcional[]" id="partidasemchave" value= "partidasemchave" >
                                    <label for="partidasemchave">partidasemchave</label>
                                </li>
                            <li><input type="checkbox" name="opcional[]" id="smarthpone" value="smarthpone" >
                                    <label for="smarthpone">integração com celular</label>
                                </li>
                            <li><input type="checkbox" name="opcional[]" id="banco-couro" value="banco-couro" >
                                    <label for="banco-couro">banco-couro</label>
                                </li>
                        </ul>
                    </div>
                    <div class="caixainputs">
                        <p>fotos do carro <span class="campoobrigatorio">*</span>
                            <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpg" required>

                        </p>
                    </div>
                    <input type="submit" value="enviar" class="btn-submit">
            </form> 
        </div>
    </div>
    </div>
</body>

</html>
