<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header class="cabecalho">
            <h3> cadastre seu veículo para vender mais rápido </h3>

        </header>
        <div class="form-container">
            <div class="form-header">
                <p>formulário</p>
            </div>
            <div class="form-body">
                <h1 class="form-titulo">Venda fácil seu carro!</h1>
                <p>descreva as características do carro e marque os opcionais que ele possui</p>
                <form>
                    <div class="caixainputs">
                        <label for="title">titúlo do anúncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title" class= "block" placeholder="digite um título"
                            minlength="1" maxlength="30" required>

                    </div>
                    <div class="caixainputs">
                        <label for="preco">preço <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco" class="block" placeholder="digite o preço"
                            required>
                    </div>

                    <div class="caixainputs">
                        <label for="descricao">descrição</label>
                        <textarea name="descricao" id="descricao" class="block"
                            placeholder="faça a descrição do seu veículo aqui"></textarea>
                    </div>
                    <div class="caixainputs">
                        <label for="marca">marca<span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder="digite a marca" required>
                    </div>
                    <div class="caixainputs">
                        <label for="modelo">modelo<span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder="digite o modelo" required>
                    </div>
                    <div class="caixainputs">
                        <label for="kilometragem">kilometragem<span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder="digite uma kilometragem" required>
                    </div>
                    <div class="caixainputs">
                        <label for="data-compra">data compra<span class="campo-obrigatorio">*</span></label>
                        <input type="date" name="data-compra" id="data-compra" class="block" required>
                    </div>
                    <div class="caixainputs">
                       <p>tipo de câmbio: <span class="campo-obrigatorio">*</span></p>
                       <input type="radio" name="marcha" id="manual">
                       <label for="manual">manual</label>
                         <input type="radio" name="marcha" id="auto">
                       <label for="automatico">automático</label>
                    
                    </div>
            </form>
        </div>
    </div>
    </div>
</body>

</html>
