<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3> cadastre seu veículo para vender mais rápido </h3>
            
        </header>
        <div class="form-container">
         <div clas=<form-header>
            <p>formulário</p>
        </div>
            <div class="form-body">
                <h1 class="form-titulo">Venda fácil seu carro</h1>
                <p>descreva as características do carro e marque os opcionais que ele possui</p>
                <form>
                    <div class="caixainputs">
                        <label for="title">titúlo do anúncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title class= "block" placeholder="digite um título" minlength="1" maxlength="30" required>
                        
                    </div>
                     <div class="caixainputs">
                        <label for="preco">preço <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco" class="block" placeholder="digite o preço" required>
                    </div>
                    
                    <div class="caixainputs">
                        <label for="descricao">descrição</label>
                        <textarea name="descricao" id="descricao" class="block" placeholder="faça a descricao do seu veiculo aqui"></textarea>
                    </div>


                </form>
            </div>
        </div>
    </div>
</body>
</html>
